<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inventory Manager — by BigHappySmiley</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Sans:wght@700;800&display=swap" rel="stylesheet">

<!-- React 18 (UMD, no build step) -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- In-browser JSX transform -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Firebase compat SDK (script-tag friendly, no bundler) -->
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore-compat.js"></script>
<!-- Three.js r128 for the 3D warehouse view -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<style>
:root {
  --accent: #7c3aed;
  --accent-2: #5b21b6;
  --success: #16a34a;
  --danger: #dc2626;
  --info: #2563eb;
}
html[data-theme="dark"] {
  --bg: #0d0f14;
  --panel: #13161e;
  --card: #1a1d27;
  --border: #252838;
  --text: #e8eaf0;
  --muted: #6b7094;
  --shadow: 0 4px 16px rgba(0,0,0,0.4);
}
html[data-theme="light"] {
  --bg: #f0f2f5;
  --panel: #ffffff;
  --card: #ffffff;
  --border: #dde1ea;
  --text: #1a1d27;
  --muted: #8a8fa8;
  --shadow: 0 2px 10px rgba(20,20,40,0.08);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  transition: background .15s, color .15s;
}
h1, h2, h3, .heading { font-family: 'DM Sans', sans-serif; font-weight: 800; }
#root { height: 100%; }
button { font-family: inherit; cursor: pointer; }
input, select, textarea { font-family: inherit; }
a { color: var(--accent); }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 6px; }

/* ---------- Layout ---------- */
.app-shell { display: flex; height: 100vh; overflow: hidden; }
.main-area { flex: 1; overflow-y: auto; padding: 28px 32px; }

/* ---------- Sidebar ---------- */
.sidebar {
  width: 224px; min-width: 224px; background: var(--panel);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  transition: width .18s, min-width .18s; overflow: hidden;
}
.sidebar.collapsed { width: 60px; min-width: 60px; }
.sidebar-logo-row { display: flex; align-items: center; gap: 10px; padding: 18px 16px; cursor: pointer; border-bottom: 1px solid var(--border); }
.logo-box {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  display: flex; align-items: center; justify-content: center;
}
.sidebar-brand { line-height: 1.2; white-space: nowrap; }
.sidebar-brand .name { font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: 0.95rem; }
.sidebar-brand .sub { font-size: 0.7rem; color: var(--muted); }
.sidebar-nav { flex: 1; padding: 10px 8px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px;
  color: var(--muted); background: none; border: none; text-align: left; font-size: 0.88rem;
  white-space: nowrap; position: relative;
}
.nav-item:hover { background: var(--card); color: var(--text); }
.nav-item.active { background: var(--accent); color: #fff; }
.nav-item .nav-icon { width: 18px; text-align: center; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--danger); color: #fff; font-size: 0.65rem;
  border-radius: 10px; padding: 1px 6px; font-weight: 700;
}
.sidebar-footer { padding: 10px 12px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
.theme-toggle {
  display: flex; align-items: center; justify-content: space-between; background: var(--card);
  border: 1px solid var(--border); border-radius: 8px; padding: 6px 10px; font-size: 0.8rem; color: var(--text);
}
.user-chip { display: flex; align-items: center; gap: 8px; }
.avatar-circle {
  width: 30px; height: 30px; border-radius: 50%; background: var(--accent); color: #fff;
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; flex-shrink: 0;
}
.user-chip-info { flex: 1; min-width: 0; overflow: hidden; }
.user-chip-info .uname { font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.icon-btn { background: none; border: none; color: var(--muted); padding: 4px; border-radius: 6px; }
.icon-btn:hover { background: var(--card); color: var(--text); }

/* ---------- Cards / generic ---------- */
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: var(--shadow); }
.panel-title { font-size: 1rem; margin: 0 0 14px; }
.page-title { font-size: 1.6rem; margin: 0 0 4px; }
.page-sub { color: var(--muted); font-size: 0.88rem; margin: 0 0 24px; }

.btn {
  border: none; border-radius: 8px; padding: 9px 16px; font-size: 0.85rem; font-weight: 600;
  display: inline-flex; align-items: center; gap: 6px; transition: opacity .12s;
}
.btn:hover { opacity: 0.88; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-success { background: var(--success); color: #fff; }
.btn-sm { padding: 6px 11px; font-size: 0.78rem; }
.btn-block { width: 100%; justify-content: center; }

.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
.field label { font-size: 0.78rem; color: var(--muted); font-weight: 600; }
.field input, .field select, .field textarea {
  background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
  padding: 9px 11px; color: var(--text); font-size: 0.9rem;
}
html[data-theme="light"] .field input, html[data-theme="light"] .field select, html[data-theme="light"] .field textarea { background: #f7f8fb; }
.field input:focus, .field select:focus, .field textarea:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
.field-row { display: flex; gap: 12px; }
.field-row .field { flex: 1; }
.field-error { color: var(--danger); font-size: 0.78rem; }
.field-hint { color: var(--muted); font-size: 0.75rem; }

.badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; }
.badge-success { background: rgba(22,163,74,.15); color: var(--success); }
.badge-danger { background: rgba(220,38,38,.15); color: var(--danger); }
.badge-info { background: rgba(37,99,235,.15); color: var(--info); }
.badge-muted { background: rgba(107,112,148,.15); color: var(--muted); }

.empty-state { text-align: center; color: var(--muted); padding: 48px 0; font-size: 0.9rem; }

/* ---------- Toasts ---------- */
.toast-stack { position: fixed; top: 18px; right: 18px; display: flex; flex-direction: column; gap: 8px; z-index: 2000; }
.toast {
  background: var(--card); border: 1px solid var(--border); border-left: 4px solid var(--info);
  color: var(--text); padding: 12px 16px; border-radius: 8px; font-size: 0.85rem; box-shadow: var(--shadow);
  min-width: 240px; max-width: 360px; cursor: pointer; animation: toast-in .15s ease-out;
}
@keyframes toast-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast-success { border-left-color: var(--success); }
.toast-error { border-left-color: var(--danger); }
.toast-info { border-left-color: var(--info); }

/* ---------- Loading ---------- */
.full-spinner { height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); }
.spinner {
  width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border);
  border-top-color: var(--accent); animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ---------- Auth screen ---------- */
.auth-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); padding: 20px; }
.auth-card { width: 100%; max-width: 380px; }
.auth-logo-row { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 26px; }
.auth-logo-row .logo-box { width: 52px; height: 52px; border-radius: 14px; }
.auth-logo-row .name { font-family: 'DM Sans', sans-serif; font-weight: 800; font-size: 1.3rem; }
.auth-logo-row .sub { color: var(--muted); font-size: 0.8rem; }
.auth-link { color: var(--accent); font-size: 0.8rem; background: none; border: none; padding: 0; text-decoration: none; }
.auth-switch { text-align: center; margin-top: 16px; font-size: 0.85rem; color: var(--muted); }
.auth-banner-success { background: rgba(22,163,74,.12); border: 1px solid var(--success); color: var(--success); padding: 10px 12px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 14px; }
.auth-banner-error { background: rgba(220,38,38,.12); border: 1px solid var(--danger); color: var(--danger); padding: 10px 12px; border-radius: 8px; font-size: 0.83rem; margin-bottom: 14px; }

/* ---------- Stat cards ---------- */
.stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { border-top: 3px solid var(--accent); }
.stat-card .stat-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; }
.stat-card .stat-value { font-size: 1.7rem; font-weight: 800; font-family: 'DM Sans', sans-serif; }
.stat-card.danger { border-top-color: var(--danger); }
.stat-card.danger .stat-value { color: var(--danger); }
.dash-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 18px; }

/* ---------- Misc shared ---------- */
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; display: inline-block; }
.toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar input[type=text], .toolbar input[type=search] {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px;
  color: var(--text); font-size: 0.85rem; min-width: 220px;
}
.toolbar select { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 0.85rem; }
.pill { display: inline-flex; align-items: center; gap: 4px; padding: 1px 7px; border-radius: 20px; font-size: 0.68rem; font-weight: 600; }
.pill-low { background: rgba(220,38,38,.15); color: var(--danger); }
.pill-company { background: rgba(37,99,235,.15); color: var(--info); }
.pill-custom { background: rgba(107,112,148,.15); color: var(--muted); }

table.data-table { width: 100%; border-collapse: collapse; }
table.data-table th { text-align: left; font-size: 0.72rem; text-transform: uppercase; color: var(--muted); padding: 8px 10px; border-bottom: 1px solid var(--border); }
table.data-table td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 0.86rem; vertical-align: top; }
table.data-table tr:hover td { background: rgba(124,58,237,.04); }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); display: flex; align-items: center; justify-content: center; z-index: 1500; padding: 20px; }
.modal-box { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; max-width: 480px; width: 100%; max-height: 86vh; overflow-y: auto; padding: 22px; }

.progress-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
.progress-fill { background: var(--accent); height: 100%; transition: width .15s; }

.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
.tab-btn { background: none; border: none; padding: 9px 14px; font-size: 0.85rem; color: var(--muted); border-bottom: 2px solid transparent; }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ---------- Barcode scanner ---------- */
.scanner-panel { background: var(--bg); border: 1px dashed var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 18px; }
html[data-theme="light"] .scanner-panel { background: #f7f8fb; }
.scanner-panel-active { border-color: var(--accent); border-style: solid; }
.scanner-header { display: flex; align-items: center; justify-content: space-between; }
.scanner-title { font-size: 0.85rem; font-weight: 600; }
.scanner-btn { background: var(--accent); color: #fff; border: none; border-radius: 7px; padding: 7px 14px; font-size: 0.8rem; font-weight: 600; }
.scanner-btn-cancel { background: var(--danger); }
.scanner-buffer {
  margin-top: 10px; background: var(--panel); border: 1px solid var(--border); border-radius: 7px;
  padding: 8px 10px; font-family: monospace; font-size: 0.95rem; min-height: 1.4em; letter-spacing: 0.5px;
}
.scanner-cursor { display: inline-block; width: 2px; height: 1em; background: var(--accent); margin-left: 2px; vertical-align: middle; animation: blink 1s step-end infinite; }
@keyframes blink { 50% { opacity: 0; } }
.scanner-helper { color: var(--muted); font-size: 0.76rem; margin: 8px 0 0; }

/* ---------- Support ---------- */
.support-layout { display: grid; grid-template-columns: 360px 1fr; gap: 18px; align-items: start; }
.status-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
.status-pill {
  background: var(--card); border: 1px solid var(--border); color: var(--muted);
  border-radius: 20px; padding: 5px 12px; font-size: 0.76rem; font-weight: 600;
}
.status-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.ticket-list { display: flex; flex-direction: column; gap: 8px; max-height: 70vh; overflow-y: auto; }
.ticket-row {
  background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px;
  cursor: pointer; display: flex; flex-direction: column; gap: 6px;
}
.ticket-row:hover { border-color: var(--accent); }
.ticket-row.active { border-color: var(--accent); background: rgba(124,58,237,.08); }
.ticket-row-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.ticket-subject { font-size: 0.88rem; font-weight: 600; }
.ticket-meta-row { display: flex; align-items: center; gap: 8px; font-size: 0.74rem; color: var(--muted); }
.ticket-detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
.ticket-original { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px; margin-bottom: 18px; font-size: 0.88rem; line-height: 1.5; white-space: pre-wrap; }
html[data-theme="light"] .ticket-original { background: #f7f8fb; }
.chat-thread { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; max-height: 360px; overflow-y: auto; padding-right: 4px; }
.chat-bubble-row { display: flex; flex-direction: column; max-width: 78%; }
.chat-bubble-row.own { align-self: flex-end; align-items: flex-end; }
.chat-bubble-row.other { align-self: flex-start; align-items: flex-start; }
.chat-bubble { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 9px 13px; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.45; }
.chat-bubble-row.own .chat-bubble { background: var(--accent); color: #fff; border-color: var(--accent); }
.chat-bubble-meta { font-size: 0.7rem; color: var(--muted); margin-top: 3px; display: flex; align-items: center; gap: 5px; }
.admin-badge { background: var(--accent); color: #fff; font-size: 0.6rem; font-weight: 800; border-radius: 4px; padding: 1px 5px; letter-spacing: 0.4px; }
.reply-composer { display: flex; gap: 8px; align-items: flex-end; }
.reply-composer textarea { flex: 1; resize: none; min-height: 44px; max-height: 140px; }
.closed-notice, .locked-notice { background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: var(--muted); text-align: center; }
html[data-theme="light"] .closed-notice, html[data-theme="light"] .locked-notice { background: #f7f8fb; }

/* ---------- Admin Panel ---------- */
.user-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border-bottom: 1px solid var(--border); }
.user-row:last-child { border-bottom: none; }
.user-row-email { font-size: 0.88rem; font-weight: 600; }
.user-row-uid { font-family: monospace; font-size: 0.74rem; color: var(--muted); user-select: all; }
.avatar-circle-lg { width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.4rem; flex-shrink: 0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react,env" src="./app.js"></script>
</body>
</html>

[build]
  publish = "."

# This app loads app.js as an in-browser-Babel script (type="text/babel").
# Netlify's automatic JS post-processing detects files by extension and will
# try to minify/bundle app.js as plain JavaScript, which breaks on the JSX
# syntax inside it. Disable post-processing so the file is served as-is.
[build.processing]
  skip_processing = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Never let the browser/CDN cache a stale index.html across deploys —
# this is a single-page app and the HTML is the entry point that must
# always reflect the latest deploy.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
